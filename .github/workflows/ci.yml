name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tui-build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install TUI dependencies
        run: npm ci --omit=optional

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

  gui-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install full dependencies
        run: npm ci

      - name: Build GUI
        run: npm run build:gui
